apiVersion: apps/v1
kind: Deployment
metadata:
  name: u6o-host
  labels:
    app: u6o-host
spec:
  replicas: 1
  selector:
    matchLabels:
      app: u6o-host
  template:
    metadata:
      labels:
        app: u6o-host
    spec:
      # LH-P7: graceful shutdown. SIGTERM (sent on pod delete) triggers the
      # host's save-and-exit path; give it time to flush before SIGKILL.
      terminationGracePeriodSeconds: 60
      containers:
        - name: host
          image: docker.io/cduncc/u6o-host:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 22
              protocol: TCP
          volumeMounts:
            - name: host-data
              mountPath: /u6o-host/
      volumes:
        - name: host-data
          hostPath:
            # LH-P7.4: Docker Desktop on Windows handles `C:/host` or `/run/desktop/mnt/host/c/host`.
            # Using forward slashes is more robust across different K8s-on-Windows engines.
            # DirectoryOrCreate ensures the pod starts even if the user hasn't created the folder.
            path: C:/host
            type: DirectoryOrCreate
      nodeSelector:
        kubernetes.io/os: linux
---
apiVersion: v1
kind: Service
metadata:
  name: u6o-host-service
spec:
  selector:
    app: u6o-host
  ports:
    - protocol: TCP
      port: 22
      targetPort: 22
  type: LoadBalancer
