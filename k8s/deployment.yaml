apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: u6o-host-save-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: u6o-host
  labels:
    app: u6o-host
spec:
  replicas: 1
  selector:
    matchLabels:
      app: u6o-host
  template:
    metadata:
      labels:
        app: u6o-host
    spec:
      # LH-P7: graceful shutdown. SIGTERM (sent on pod delete) triggers the
      # host's save-and-exit path; give it time to flush before SIGKILL.
      terminationGracePeriodSeconds: 60
      containers:
      - name: host
        image: u6o-host:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 22
          protocol: TCP
        volumeMounts:
        - name: save-data
          mountPath: /u6o-host/save
      volumes:
      - name: save-data
        persistentVolumeClaim:
          claimName: u6o-host-save-pvc
      nodeSelector:
        kubernetes.io/os: linux
---
apiVersion: v1
kind: Service
metadata:
  name: u6o-host-service
spec:
  selector:
    app: u6o-host
  ports:
    - protocol: TCP
      port: 22
      targetPort: 22
  type: LoadBalancer
